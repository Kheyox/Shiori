name: Build Windows (.exe)

# Construit l'application de bureau Windows (Tauri) sur une machine Windows
# de GitHub. Déclenchable à la main (Actions → Run workflow) ; un tag v*
# publie en plus le .exe dans une Release GitHub.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'kobo-converter.html'
      - 'src-tauri/**'
      - '.github/workflows/build-windows.yml'

permissions:
  contents: write

concurrency:
  group: build-windows
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Préparer le frontend local (hors-ligne)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/vendor | Out-Null
          Copy-Item kobo-converter.html dist/index.html
          # grave la version (compteur de commits) dans l'exe pour le bandeau de maj
          $count = git rev-list --count HEAD
          $V = "r$count"
          $V_SEMVER = "1.1.$count"
          
          # Met à jour la version de l'application dans Cargo.toml
          $cargo = Get-Content src-tauri/Cargo.toml -Raw
          $cargo = $cargo -replace 'version = "1.1.0"', "version = `"$V_SEMVER`""
          Set-Content src-tauri/Cargo.toml $cargo -NoNewline
          
          # Met à jour la version de l'application dans tauri.conf.json
          $conf = Get-Content src-tauri/tauri.conf.json -Raw
          $conf = $conf -replace '"version": "1.1.0"', `'"version": "$V_SEMVER"'`
          Set-Content src-tauri/tauri.conf.json $conf -NoNewline

          $h0 = Get-Content dist/index.html -Raw
          $h0 = $h0 -replace 'const APP_VERSION="[^"]*"', "const APP_VERSION=`"$V`""
          Set-Content dist/index.html $h0 -NoNewline
          Copy-Item -Recurse icons dist/icons
          Copy-Item manifest.webmanifest dist/
          # Vendorise les libs CDN pour que l'exe fonctionne sans internet
          Invoke-WebRequest https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js -OutFile dist/vendor/jszip.min.js
          Invoke-WebRequest https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js -OutFile dist/vendor/pdf.min.js
          Invoke-WebRequest https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js -OutFile dist/vendor/pdf.worker.min.js
          $h = Get-Content dist/index.html -Raw
          $h = $h -replace 'https://cdnjs\.cloudflare\.com/ajax/libs/jszip/3\.10\.1/jszip\.min\.js', 'vendor/jszip.min.js'
          $h = $h -replace 'https://cdnjs\.cloudflare\.com/ajax/libs/pdf\.js/3\.11\.174/pdf\.min\.js', 'vendor/pdf.min.js'
          $h = $h -replace 'https://cdnjs\.cloudflare\.com/ajax/libs/pdf\.js/3\.11\.174/pdf\.worker\.min\.js', 'vendor/pdf.worker.min.js'
          Set-Content dist/index.html $h -NoNewline

      - name: Installer la CLI Tauri
        run: npm install -D @tauri-apps/cli@^2

      - name: Générer les icônes (.ico) depuis le PNG
        run: npx tauri icon icons/icon-1024.png

      - name: Compiler l'application
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Générer le manifeste d'auto-update (update.json)
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem src-tauri/target/release/bundle/nsis/*.sig | Select-Object -First 1
          if ($sigFile) {
              $sigContent = (Get-Content $sigFile.FullName -Raw).Trim()
              $count = git rev-list --count HEAD
              $V_SEMVER = "1.1.$count"
              $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              $updateJson = @{
                  version = $V_SEMVER
                  pub_date = $pubDate
                  notes = "Mise à jour automatique de Shiori"
                  platforms = @{
                      "windows-x86_64" = @{
                          signature = $sigContent
                          url = "https://github.com/Kheyox/Shiori/releases/download/latest/Shiori-Setup.exe"
                      }
                  }
              }
              $updateJson | ConvertTo-Json -Depth 5 | Set-Content -Path update.json -Encoding utf8
              Write-Host "update.json généré avec succès."
          } else {
              Write-Warning "Fichier .sig introuvable (clé de signature absente ?)."
          }

      - name: Publier l'installateur en artefact
        uses: actions/upload-artifact@v4
        with:
          name: Shiori-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Nom stable pour la Release
        shell: pwsh
        run: |
          Copy-Item (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1).FullName Shiori-Setup.exe

      - name: Publier dans la Release « latest »
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Shiori — dernières builds"
          body: "Téléchargements toujours à jour : **Shiori-Setup.exe** (Windows) et **Shiori.apk** (Android). Remplacés automatiquement à chaque build."
          files: |
            Shiori-Setup.exe
            update.json

      - name: Release versionnée (si tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
